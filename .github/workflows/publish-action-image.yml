name: publish-action-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.1.0)"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push action image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.action
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-action:${{ inputs.tag }}
            ghcr.io/${{ github.repository }}-action:latest

      - name: Show digest to pin
        run: |
          echo "Pinned reference:"
          echo "docker://ghcr.io/${{ github.repository }}-action@${{ steps.build.outputs.digest }}"

