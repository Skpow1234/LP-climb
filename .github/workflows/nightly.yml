name: nightly

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate ladder SVGs
        uses: ./
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/lp.svg?theme=rift
            dist/lp-dark.svg?theme=assassin

      - name: Ensure output exists
        run: |
          set -euo pipefail
          ls -la dist
          test -f dist/lp.svg
          test -f dist/lp-dark.svg

      - name: Push dist/ to output branch
        uses: crazy-max/ghaction-github-pages@df5cc2bfa78282ded844b354faee141f06b41865 # v4.2.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

