name: ci

on:
  push:
    branches: ["main"]
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install (workspaces)
        run: npm install --workspaces --include-workspace-root

      - name: Build all packages
        run: |
          set -euo pipefail
          npm --workspace packages/types run build
          npm --workspace packages/core run build
          npm --workspace packages/themes run build
          npm --workspace packages/github-contrib run build
          npm --workspace packages/svg-creator run build
          npm --workspace packages/api run build
          npm --workspace packages/action run build

