name: ci

on:
  push:
    branches: ["main"]
  pull_request: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install (workspaces)
        run: npm install --workspaces --include-workspace-root

      - name: Build all packages
        run: |
          set -euo pipefail
          npm --workspace packages/types run build
          npm --workspace packages/core run build
          npm --workspace packages/themes run build
          npm --workspace packages/github-contrib run build
          npm --workspace packages/svg-creator run build
          npm --workspace packages/api run build
          npm --workspace packages/action run build
          npm --workspace packages/demo run build

      - name: Snapshot tests (determinism)
        run: npm --workspace packages/svg-creator run test

  test-action:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - name: Use local Dockerfile.action for action
        run: |
          set -euo pipefail
          sed -i "s|image: .*|image: Dockerfile.action|g" action.yml

      - name: Run local action
        uses: ./
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/lp.svg?theme=rift
            dist/lp-dark.svg?theme=assassin
            dist/lp-vs.svg?theme=rift&vs=torvalds

      - name: Ensure expected files exist
        run: |
          set -euo pipefail
          ls -la dist
          test -f dist/lp.svg
          test -f dist/lp-dark.svg
          test -f dist/lp-vs.svg

