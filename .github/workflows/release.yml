name: release

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build action image
        run: |
          docker build -f Dockerfile.action -t lp-climb-action:local .

