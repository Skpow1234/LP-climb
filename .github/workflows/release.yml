name: release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            v="${GITHUB_REF_NAME}"
          else
            v="dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        id: api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

      - name: Build and push Action image
        id: action
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.action
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-action:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}-action:latest

      - name: Pin action digest into action.yml
        if: ${{ steps.ver.outputs.version != 'dev' }}
        run: |
          set -euo pipefail
          node scripts/pin-action-image.mjs "${{ steps.action.outputs.digest }}" "${{ github.repository }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add action.yml
          git commit -m "chore(action): pin docker digest (${{ steps.ver.outputs.version }})" || true
          git push origin HEAD:main

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body: |
            ## Images
            - **API**: `ghcr.io/${{ github.repository }}@${{ steps.api.outputs.digest }}`
            - **Action (pinned)**: `docker://ghcr.io/${{ github.repository }}-action@${{ steps.action.outputs.digest }}`


