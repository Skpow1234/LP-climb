name: publish-api-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.1.0)"
        required: true
        default: "dev"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive image repo (lowercase)
        id: img
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY,,}"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.repo }}:${{ inputs.tag }}
            ghcr.io/${{ steps.img.outputs.repo }}:latest

      - name: Show digest
        run: |
          echo "Image digest:"
          echo "ghcr.io/${{ steps.img.outputs.repo }}@${{ steps.build.outputs.digest }}"

