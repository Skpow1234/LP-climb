    <text x="830" y="84" class="division" text-anchor="middle">I</text>
    <path d="810.5,127 L 811.734,130.301 L 815.255,130.455 L 812.497,132.649 L 813.439,136.045 L 810.5,134.1 L 807.561,136.045 L 808.503,132.649 L 805.745,130.455 L 809.266,130.301 Z" fill="#F2C14E" stroke="#F2C14E" stroke-width="1.2"/><path d="823.5,127 L 824.734,130.301 L 828.255,130.455 L 825.497,132.649 L 826.439,136.045 L 823.5,134.1 L 820.561,136.045 L 821.503,132.649 L 818.745,130.455 L 822.266,130.301 Z" fill="#F2C14E" stroke="#F2C14E" stroke-width="1.2"/><path d="836.5,127 L 837.734,130.301 L 841.255,130.455 L 838.497,132.649 L 839.439,136.045 L 836.5,134.1 L 833.561,136.045 L 834.503,132.649 L 831.745,130.455 L 835.266,130.301 Z" fill="#F2C14E" stroke="#F2C14E" stroke-width="1.2"/><path d="849.5,127 L 850.734,130.301 L 854.255,130.455 L 851.497,132.649 L 852.439,136.045 L 849.5,134.1 L 846.561,136.045 L 847.503,132.649 L 844.745,130.455 L 848.266,130.301 Z" fill="#F2C14E" stroke="#F2C14E" stroke-width="1.2"/>
  </g>

  
