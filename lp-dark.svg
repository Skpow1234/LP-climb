    <text x="804" y="185" class="rowValue">18d</text>
    <text x="868" y="185" class="rowScore" text-anchor="end"><tspan class="rowScoreNum">9</tspan> / 100</text>
  </g>
  <g transform="translate(0, 0)" class="row row3">
    <g transform="translate(34, 201)" class="rowIcon"><rect x="-6" y="-5" width="12" height="11" rx="1.5" class="iconStroke"/><rect x="-6" y="-5" width="12" height="3" class="iconFill"/><rect x="-4" y="-7" width="1.4" height="3" class="iconFill"/><rect x="2.6" y="-7" width="1.4" height="3" class="iconFill"/></g>
    <text x="48" y="205" class="rowLabel">30d</text>
